<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Visualization</title>
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1 class="box text">Loss Visualization</h1>

<div class="visual">
    <canvas id="lossChart"></canvas>
</div>

<form class="params text" id="params">

    <div class="box">

        <h2>Model Params</h2>

        <div class="input-group">
            <label for="number_of_layers">Number of Layers (2-10):</label>
            <input type="number" id="number_of_layers" name="number_of_layers" min="2" max="10" placeholder="5">

            <label for="middle_layer_size">Size of Middle Layers (10-200):</label>
            <input type="number" id="middle_layer_size" name="middle_layer_size" min="10" max="200" placeholder="80">
        </div>
    </div>

    <div class="box">

        <h2>Training Params</h2>

        <div class="training-params-inputs">
            <div class="input-group">
                <label for="training_size">Training Size (100-5000):</label>
                <input type="number" id="training_size" name="training_size" min="100" max="5000" placeholder="2000">

                <label for="batch_size">Batch Size (2-80):</label>
                <input type="number" id="batch_size" name="batch_size" min="2" max="80" placeholder="36">
            </div>

            <div class="input-group">
                <label for="epochs">Epochs (1-50):</label>
                <input type="number" id="epochs" name="epochs" min="1" max="50" placeholder="20">

                <label for="min_lr">Min LR (0.0001-0.01):</label>
                <input type="number" id="min_lr" name="min_lr" min="0.0001" max="0.01" step="any" placeholder="0.001">
            </div>

            <div class="input-group">
                <label for="max_lr">Max LR (0.02-0.05):</label>
                <input type="number" id="max_lr" name="max_lr" min="0.02" max="0.05" step="any" placeholder="0.01">

                <label for="beta">Beta (0.2-0.90):</label>
                <input type="number" id="beta" name="beta" min="0.2" max="0.90" step="any" placeholder="0.9">
            </div>
        </div>
    </div>

    <div class="button-con box">
        <button type="submit">Train</button>
        <h3 class="text">Accuracy:</h3>
        <h2 id="accuracy" class="text">0%</h2>
    </div>

</form>

<script src="./index.js" defer></script>
</body>
</html>

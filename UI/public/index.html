<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Data Visualization</title>
</head>
<body>

<h1>Loss Visualization</h1>

<div class="visual"></div>

<form class="params" id="params">

    <div class="model_params">

        <h2>Model Params</h2>

        <label for="number_of_layers">Batch Size (1-10):</label>
        <input type="number" id="number_of_layers" name="number_of_layers" min="1" max="10" placeholder="5">

        <label for="middle_layer_size">Batch Size (10-200):</label>
        <input type="number" id="middle_layer_size" name="middle_layer_size" min="10" max="200" placeholder="80">

    </div>

    <div class="training_params">

        <h2>Training Params</h2>

        <label for="training_size">Training Size (100-5000):</label>
        <input type="number" id="training_size" name="training_size" min="100" max="5000" placeholder="2000">

        <label for="batch_size">Batch Size (2-80):</label>
        <input type="number" id="batch_size" name="batch_size" min="2" max="80" placeholder="36">

        <label for="epochs">Epochs (1-50):</label>
        <input type="number" id="epochs" name="epochs" min="1" max="50" placeholder="20">

        <label for="min_lr">Min LR (0.000001-0.01):</label>
        <input type="number" id="min_lr" name="min_lr" min="0.000001" max="0.01" placeholder="0.001">

        <label for="max_lr">Min LR (0.0001-0.01):</label>
        <input type="number" id="max_lr" name="max_lr" min="0.0001" max="0.01" placeholder="0.01">

        <label for="beta">Beta (0.1-0.99):</label>
        <input type="number" id="beta" name="beta" min="0.1" max="0.99" placeholder="0.9">

    </div>

    <button type="submit">Train</button>

</form>

<script src="./index.js" defer></script>

</body>
</html>
